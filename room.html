<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Room — Fritter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Literata:opsz,wght@6..72,400;6..72,600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="protected-page">
<header class="site-header"><div class="wrap header-inner">
  <a href="dashboard.html" class="logo"><span class="logo-accent">F</span>ritter</a>
  <nav class="main-nav"><a href="dashboard.html" class="nav-dashboard">Dashboard</a><a href="biology.html">Biology</a><a href="chemistry.html">Chemistry</a><a href="physics.html">Physics</a><a href="rooms.html">Rooms</a></nav>
  <div data-auth-nav></div>
</div></header>

<section class="page-header" style="padding:40px 0 30px;">
  <div class="wrap" style="display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap;">
    <div>
      <p class="eyebrow" id="room-meta">Loading&hellip;</p>
      <h1 id="room-title" style="font-size:clamp(28px,4vw,38px)"></h1>
      <p id="room-description"></p>
    </div>
    <button id="delete-room-btn" class="btn btn-ghost" hidden>Delete room</button>
  </div>
</section>

<main class="wrap" style="padding:10px 0 80px; max-width:760px;">

  <div id="room-not-found" hidden>
    <p class="lesson-desc">This room doesn't exist &mdash; check the link, or head back to <a href="rooms.html" style="color:var(--gold2)">Rooms</a>.</p>
  </div>

  <div id="room-body" hidden>

    <!-- Join bar: shown to anyone who hasn't joined yet -->
    <div id="join-bar" class="join-bar" hidden>
      <p>You're viewing this room as a guest &mdash; join to post or upload.</p>
      <button id="join-room-btn" class="btn btn-primary">Join room</button>
    </div>

    <!-- Message feed -->
    <div id="message-feed" class="message-feed"></div>

    <!-- Composer: only shown/enabled once joined -->
    <div id="composer" class="composer" hidden>
      <div class="composer-identity">
        <label for="post-identity">Post as</label>
        <select id="post-identity">
          <option value="real">My real name</option>
          <option value="nickname">A nickname</option>
          <option value="anon">Anonymous</option>
        </select>
        <input id="post-nickname" placeholder="Enter a nickname" hidden>
      </div>
      <textarea id="composer-text" placeholder="Ask a question, share notes, or start a discussion..." rows="3"></textarea>
      <div class="composer-actions">
        <label class="file-attach-btn">
          &#128206; Attach file
          <input type="file" id="composer-file" accept=".pdf,.png,.jpg,.jpeg" hidden>
        </label>
        <span id="composer-file-name" class="composer-file-name"></span>
        <button id="composer-submit" class="btn btn-primary">Post</button>
      </div>
      <p class="composer-note">Draft mode: attached files are noted by name only &mdash; real file storage comes with the next upgrade.</p>
    </div>

  </div>

</main>

<script src="firebase-config.js"></script>
<script src="auth-state.js"></script>
<script src="rooms-data.js"></script>
<script src="activity.js"></script>
<script src="room.js"></script>
</body></html>
